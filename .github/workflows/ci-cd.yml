name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache SonarQube scanner
        uses: actions/cache@v4
        with:
          path: ~/.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet-sonarscanner begin
          /k:"Mel-redoc_deploiement-azure-automatise"
          /o:"mel-redoc"
          /d:sonar.token="$SONAR_TOKEN"

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: End SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook (staging)
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"

      - name: Wait for staging to be healthy
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://monapi-staging.onrender.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy!"
              exit 0
            fi
            echo "Attempt $i: staging not ready yet (status $STATUS), waiting 15s..."
            sleep 15
          done
          echo "Staging failed health check after multiple attempts."
          exit 1

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook (production)
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}"

      - name: Wait for production to be healthy
        id: healthcheck
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://monapi-production.onrender.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Production is healthy!"
              exit 0
            fi
            echo "Attempt $i: production not ready yet (status $STATUS), waiting 15s..."
            sleep 15
          done
          echo "Production failed health check after multiple attempts."
          exit 1

      - name: Rollback production on failure
        if: failure()
        run: |
          echo "Deployment failed, triggering rollback..."
          LAST_GOOD_DEPLOY=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_PRODUCTION }}/deploys?limit=5" \
            | jq -r '[.[] | select(.deploy.status=="live")][0].deploy.id')
          echo "Rolling back to deploy: $LAST_GOOD_DEPLOY"
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"deployId\": \"$LAST_GOOD_DEPLOY\"}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_PRODUCTION }}/rollback"
